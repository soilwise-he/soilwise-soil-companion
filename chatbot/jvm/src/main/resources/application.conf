app-config: {
  name: "Soil Companion"
  version: "0.1.0-SNAPSHOT"
  version: ${?SOIL_COMPANION_VERSION}
  website: "https://soilwise-he.eu"
  website: ${?SOILWISE_WEBSITE}
  host: "localhost"
  host: ${?SOIL_COMPANION_HOST}
  port: 8080
  port: ${?SOIL_COMPANION_PORT}
  doc-splitter-max-segment-size-chars: 500
  doc-splitter-max-overlap-size-chars: 100
  doc-retriever-max-results: 5
  doc-retriever-min-score: 0.6
  catalog-retriever-max-results: 10
  chat-max-memory-size: 50
  chat-max-idle-time-sec: 600
  chat-max-tokens: -1
  chat-max-retries: 3
  # Debug: when true, log the user question and the final AI response for each query (at completion)
  debug-log-final-ai-response: true
  debug-log-final-ai-response: ${?DEBUG_LOG_FINAL_AI_RESPONSE}
  # Optional prefix applied to every line of both the user question and the final AI response
  # when debug logging is enabled. Makes lines stand out and easy to grep/select in application logs.
  ai-final-log-prefix: "[AI_FINAL] "
  ai-final-log-prefix: ${?AI_FINAL_LOG_PREFIX}
  # Safety limits to avoid exceeding model context windows
  chat-max-prompt-chars: 120000
  chat-max-prompt-chars: ${?CHAT_MAX_PROMPT_CHARS}
  upload-max-chars: 200000
  upload-max-chars: ${?UPLOAD_MAX_CHARS}
  # Session expiration in minutes (-1 disables expiration)
  session-expiration-minutes: 15
  session-expiration-minutes: ${?SESSION_EXPIRATION_MINUTES}
}

llm-provider-config: {
  name: "OpenAI"
  api-key: "REPLACE_ME"
  api-key: ${?OPENAI_API_KEY}
  chat-model: "gpt-4o-mini-2024-07-18"
  chat-model-temp: 0.1
  reason-model: "gpt-4o-2024-11-20"
  reason-model-temp: 0.0
  embedding-model: "text-embedding-3-small"
  embedding-dim: 512
}

demo-user: {
  username: "demo@soilwise"
  username: ${?DEMO_USERNAME}
  password: "demo1234"
  password: ${?DEMO_PASSWORD}
  display-name: "SoilWise User"
  display-name: ${?DEMO_DISPLAY_NAME}
}

knowledge-config: {
  dir: "./data/knowledge/"
  dir: ${?KNOWLEDGE_DIR}
}

feedback-log-config: {
  dir: "./data/feedback-logs/"
  dir: ${?FEEDBACK_LOG_DIR}
  prefix: "feedback"
  prefix: ${?FEEDBACK_LOG_PREFIX}
}

solr-config-server: {
  base-url: "https://solr.soilwise-he.containers.wur.nl/solr/records/select"
  base-url: ${?SOLR_BASE_URL}
  username: "REPLACE_ME"
  username: ${?SOLR_USERNAME}
  password: "REPLACE_ME"
  password: ${?SOLR_PASSWORD}
}

solr-retrieve-content: {
  rows: 1
  mm: "2<75%"
  df: "identifier"
  q-alt: "*:*"
  ps: 2.0
  q-op: "OR"
  fl: ["identifier", "score", "type", "title", "keywords", "abstract", "pdf_content" ]
  sort: "score desc"
  tie: 0.1
  def-type: "edismax"
  qf: [ "identifier" ]
  pf: [ "identifier" ]
}

solr-search-basic: {
  rows: 10 // should be >= catalog-retriever-max-results
  mm: "2<75%"
  df: "title"
  q-alt: "*:*"
  ps: 2.0
  q-op: "OR"
  fl: ["identifier", "score", "type", "title", "keywords", "abstract" ]
  sort: "score desc"
  tie: 0.1
  def-type: "edismax"
  qf: [ "keywords^4", "title^2", "abstract^2" ]
  pf: [ "keywords^8", "title^8", "abstract^4" ]
}

solr-search-content: {
  rows: 10 // should be >= catalog-retriever-max-results
  mm: "2<75%"
  df: "title"
  q-alt: "*:*"
  ps: 2.0
  q-op: "OR"
  fl: ["identifier", "score", "type", "title", "keywords", "abstract", "pdf_content" ]
  sort: "score desc"
  tie: 0.1
  def-type: "edismax"
  qf: [ "keywords^4", "title^2", "abstract^2", "pdf_content^1" ]
  pf: [ "keywords^8", "title^8", "abstract^4", "pdf_content^1" ]
}

catalog-config: {
  base-url: "https://repository.soilwise-he.eu/"
  item-link-base-url: "https://repository.soilwise-he.eu/cat/collections/metadata:main/items/"
  // New UI: https://client.soilwise-he-test.containers.wur.nl/
  // new UI item link: https://soilwise.containers.wur.nl/catalogue/resource/
  // dataset-doc-types: used by getAllDatasetRecords (metadata search)
  dataset-doc-types: ["Dataset^5", "Service"]
  // knowledge-doc-types: used by getAllKnowledgeRecords (metadata search)
  knowledge-doc-types: ["\"Journal Article\"^10", "Document^5", "Report"]
  // knowledge-content-doc-types: used by getAllKnowledgeContent (full text content search)
  knowledge-content-doc-types: ["Journal Article"]
  // item-content-doc-types: used by getItemContent (identifier-based content retrieval)
  item-content-doc-types: ["Dataset^5", "Service", "\"Journal Article\"^10", "Document^5", "Report"]

  # Timeout for HTTP connections/reads in milliseconds
  timeout-ms: 15000
  timeout-ms: ${?CATALOG_TIMEOUT_MS}

  # Identify our client politely
  user-agent: "SoilCompanionBot/0.1 (+https://soilwise-he.eu)"
}

# AgroDataCube configuration (NL agricultural field data)
agrodatacube-config: {
  # Base REST URL
  #   Docs: https://agrodatacube.wur.nl/
  #   Base: https://agrodatacube.wur.nl/api/v2/rest
  base-url: "https://agrodatacube.wur.nl/api/v2/rest"
  base-url: ${?AGRODATACUBE_BASE_URL}

  # Access token for the service. Sent in HTTP header 'Token'.
  access-token: "REPLACE_ME"
  access-token: ${?AGRODATACUBE_ACCESS_TOKEN}

  # Timeouts in milliseconds for HTTP requests
  timeout-ms: 15000
  timeout-ms: ${?AGRODATACUBE_TIMEOUT_MS}

  # Identify our client politely
  user-agent: "SoilCompanionBot/0.1 (+https://soilwise-he.eu)"

  # Helpful URLs
  docs-url: "https://agrodatacube.wur.nl/"
}

# OpenAgroKPI configuration (country-specific agricultural field data)
openagro-config: {
  # Base URL for the OpenAgroKPI API. For The Netherlands:
  #   Docs: https://openagrokpi.wur.nl/api/v1/docs/
  #   Base: https://openagrokpi.wur.nl/api/v1
  base-url: "https://openagrokpi.wur.nl/api/v1"
  base-url: ${?OPENAGRO_BASE_URL}

  # API key for the service. Sent in HTTP header 'x-api-key' (no 'Bearer' prefix).
  access-token: "REPLACE_ME"
  access-token: ${?OPENAGRO_ACCESS_TOKEN}

  # Default country code to assume if none provided in the request (e.g., "NL")
  default-country: "NL"

  # Timeout for HTTP connections/reads in milliseconds
  timeout-ms: 15000
  timeout-ms: ${?OPENAGRO_TIMEOUT_MS}

  # Identify our client politely
  user-agent: "SoilCompanionBot/0.1 (+https://soilwise-he.eu)"

  # Helpful URLs
  docs-url: "https://openagrokpi.wur.nl/api/v1/docs/"

  # Whether to allow calls when no token is configured (some endpoints may be public)
  allow-unauthenticated: false

  # Optional curated list of supported '/fields-{layer}' layers to help the LLM when offline.
  # This list is not authoritative; keep it in sync with your OpenAgroKPI deployment.
  known-layers: [
    "crop-types", "crop-diversity", "crop-rotation", "crop-soils",
    "carbon-flux",
    "winter-greenness", "annual-greenness",
    "dominant-soil-type", "standard-revenue"
    ]
}

# SoilGrids (ISRIC) configuration
soilgrids-config: {
  # Base REST URL and endpoint for properties-by-location query
  base-url: "https://dev-rest.isric.org/soilgrids/v2.0" // dev - internal use
  // base-url: "https://rest.isric.org/soilgrids/v2.0"  // prod - broken at the moment
  base-url: ${?SOILGRIDS_BASE_URL}
  query-endpoint: "/properties/query"
  query-endpoint: ${?SOILGRIDS_QUERY_ENDPOINT}

  # Default property codes to request when none are specified
  # Common examples: bdod (bulk density), soc (soil organic carbon), clay, sand, silt, phh2o, cec
  default-properties: ["bdod", "soc", "clay", "sand", "silt", "phh2o"]

  # Standard depth intervals (as used by SoilGrids) to request by default
  default-depths: ["0-5cm", "5-15cm", "15-30cm", "30-60cm", "60-100cm"]

  # Default statistic to return (often 'mean', but quantiles like 'Q0.05', 'Q0.50', 'Q0.95' can be used)
  default-value-stat: "mean"

  # Timeouts in milliseconds for HTTP requests
  timeout-ms: 15000
  timeout-ms: ${?SOILGRIDS_TIMEOUT_MS}

  # Identify our client politely
  user-agent: "SoilCompanionBot/0.1 (+https://soilwise-he.eu)"

  # Prominent usage warning to surface in responses
  usage-warning: "SoilGrids provides modelled estimates at ~250 m grid resolution; values are indicative and not field measurements. Verify with local data before decisions."

  # Helpful URLs
  docs-url: "https://soilgrids.org/"
  terms-url: "https://www.isric.org/utilise/soilgrids/soilgrids-terms-use"
}

# Wikipedia configuration
wikipedia-config: {
  # Base URL for Wikipedia API (language-specific)
  base-url: "https://en.wikipedia.org"
  base-url: ${?WIKIPEDIA_BASE_URL}

  # Default maximum number of search results to return
  default-max-results: 3

  # Maximum character length for article content (to avoid overwhelming context)
  max-content-chars: 4000
  max-content-chars: ${?WIKIPEDIA_MAX_CONTENT_CHARS}

  # Timeout for HTTP connections/reads in milliseconds
  timeout-ms: 15000
  timeout-ms: ${?WIKIPEDIA_TIMEOUT_MS}

  # Identify our client politely
  user-agent: "SoilCompanionBot/0.1 (+https://soilwise-he.eu)"

  # Wikipedia content license
  license-url: "https://en.wikipedia.org/wiki/Wikipedia:Text_of_Creative_Commons_Attribution-ShareAlike_3.0_Unported_License"

  # Automatically convert technical terms in responses to Wikipedia links
  auto-link-terms: true
  auto-link-terms: ${?WIKIPEDIA_AUTO_LINK_TERMS}

  # Minimum length (characters) for terms to be considered for auto-linking
  min-term-length: 4
  min-term-length: ${?WIKIPEDIA_MIN_TERM_LENGTH}
}
